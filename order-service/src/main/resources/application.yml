spring:
  application:
    name: order-service

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:orderdb}
    username: ${DB_USER:orderuser}
    password: ${DB_PASSWORD:orderpass}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: OrderServicePool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      # Use 'validate' in production after running Flyway migrations.
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  # ── Flyway ──────────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── Kafka ───────────────────────────────────────────────────────────────────
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.ByteArraySerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
    consumer:
      group-id: order-service-consumer
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.ByteArrayDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

# ── Axon Framework ──────────────────────────────────────────────────────────
axon:
  # Disable Axon Server — use embedded JPA event store backed by PostgreSQL.
  axonserver:
    enabled: false

  # Serialisation uses Jackson (configured via AxonConfig.java).
  serializer:
    general: jackson
    events: jackson
    messages: jackson

  # Event processing groups and their modes.
  eventhandling:
    processors:
      # Projection processor — subscribing is simpler for demo; use TRACKING in prod.
      order-query-processor:
        mode: tracking
        thread-count: 2
        batch-size: 100
      # Saga processor.
      OrderSaga:
        mode: tracking
        thread-count: 1

  # Axon Kafka extension — publishes events from the event store to Kafka.
  kafka:
    client-id: order-service
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    default-topic: order-events
    publisher:
      enabled: true
      confirmation-mode: WAIT_FOR_ACK
    producer:
      transaction-id-prefix: order-svc-
      retries: 3
      event-processor-mode: TRACKING

# ── Observability ────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: ${TRACING_SAMPLE_RATE:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
    metrics:
      export:
        enabled: true
        url: ${OTEL_METRICS_ENDPOINT:http://localhost:4318/v1/metrics}
  prometheus:
    metrics:
      export:
        enabled: true

# ── OpenAPI / Swagger ────────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  show-actuator: false

# ── Logging ──────────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.ecommerce.orderservice: DEBUG
    org.axonframework: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId:-},%X{spanId:-}] %-5level %logger{36} — %msg%n"
