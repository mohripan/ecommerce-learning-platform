####################################################################################################
# Inventory Service — Typesafe Config
####################################################################################################

# ── Service-level settings ────────────────────────────────────────────────────────────────────────
inventory {
  http {
    host = "0.0.0.0"
    host = ${?HTTP_HOST}
    port = 8080
    port = ${?HTTP_PORT}
  }

  ask-timeout = 10s
  ask-timeout = ${?ASK_TIMEOUT}

  kafka {
    bootstrap-servers        = "localhost:9092"
    bootstrap-servers        = ${?KAFKA_BOOTSTRAP_SERVERS}
    consumer-group-id        = "inventory-service-consumer"
    order-events-topic       = "order-events"
    inventory-events-topic   = "inventory-events"
  }
}

# ── Akka ──────────────────────────────────────────────────────────────────────────────────────────
akka {
  loglevel = "INFO"
  loglevel = ${?AKKA_LOG_LEVEL}

  loggers          = ["akka.event.slf4j.Slf4jLogger"]
  logging-filter   = "akka.event.slf4j.Slf4jLoggingFilter"

  actor {
    provider = cluster

    # All commands, events and state use Jackson CBOR serialization.
    serialization-bindings {
      "com.ecommerce.inventory.model.CborSerializable" = jackson-cbor
    }

    serializers {
      jackson-cbor = "akka.serialization.jackson.JacksonCborSerializer"
    }

    allow-java-serialization = off
    warn-about-java-serializer-usage = on
  }

  # ── Remote ─────────────────────────────────────────────────────────────────
  remote.artery {
    canonical {
      hostname = "127.0.0.1"
      hostname = ${?AKKA_REMOTE_HOST}
      port     = 2552
      port     = ${?AKKA_REMOTE_PORT}
    }
    transport = tcp
  }

  # ── Cluster ────────────────────────────────────────────────────────────────
  cluster {
    seed-nodes = [
      "akka://InventorySystem@127.0.0.1:2552"
    ]
    seed-nodes = ${?AKKA_SEED_NODES}

    # Require only one node to form a cluster in development; increase for production.
    min-nr-of-members = 1
    downing-provider-class = "akka.cluster.sbr.SplitBrainResolverProvider"

    sharding {
      number-of-shards = 100
      passivate-idle-entity-after = 15m
      passivate-idle-entity-after = ${?AKKA_PASSIVATE_TIMEOUT}
    }
  }

  # ── Persistence ────────────────────────────────────────────────────────────
  persistence {
    journal {
      plugin = "jdbc-journal"
      auto-start-journals = ["jdbc-journal"]
    }

    snapshot-store {
      plugin = "jdbc-snapshot-store"
      auto-start-snapshot-stores = ["jdbc-snapshot-store"]
    }
  }
}

# ── akka-persistence-jdbc ─────────────────────────────────────────────────────────────────────────
jdbc-journal {
  slick = ${slick}
}

jdbc-snapshot-store {
  slick = ${slick}
}

jdbc-read-journal {
  slick = ${slick}
}

# ── Slick / HikariCP ──────────────────────────────────────────────────────────────────────────────
slick {
  profile = "slick.jdbc.PostgresProfile$"

  db {
    host     = "localhost"
    host     = ${?DB_HOST}
    port     = 5432
    port     = ${?DB_PORT}
    name     = "inventorydb"
    name     = ${?DB_NAME}
    url      = "jdbc:postgresql://"${slick.db.host}":"${slick.db.port}"/"${slick.db.name}
    user     = "inventoryuser"
    user     = ${?DB_USER}
    password = "inventorypass"
    password = ${?DB_PASSWORD}
    driver   = "org.postgresql.Driver"

    connectionPool     = HikariCP
    numThreads         = 10
    maxConnections     = 10
    minConnections     = 2
    connectionTimeout  = 30000
    idleTimeout        = 600000
    maxLifetime        = 1800000
    poolName           = "InventoryServicePool"
  }
}

# ── Alpakka Kafka ─────────────────────────────────────────────────────────────────────────────────
akka.kafka {
  consumer {
    kafka-clients {
      bootstrap.servers             = ${inventory.kafka.bootstrap-servers}
      group.id                      = ${inventory.kafka.consumer-group-id}
      auto.offset.reset             = "earliest"
      enable.auto.commit            = false
      max.poll.records              = 500
      session.timeout.ms            = 30000
      heartbeat.interval.ms         = 10000
      fetch.min.bytes               = 1
      fetch.max.wait.ms             = 500
    }
    # Interval for committing offsets
    commit-interval                 = 5s
    wait-close-partition            = 500ms
  }

  producer {
    kafka-clients {
      bootstrap.servers             = ${inventory.kafka.bootstrap-servers}
      acks                          = "all"
      retries                       = 3
      enable.idempotence            = true
      max.in.flight.requests.per.connection = 5
      compression.type              = "snappy"
      linger.ms                     = 5
    }
    close-timeout                   = 10s
    use-dispatcher                  = "akka.kafka.default-dispatcher"
  }
}

# ── Jackson (Akka serialization) ──────────────────────────────────────────────────────────────────
akka.serialization.jackson {
  jackson-modules += "com.fasterxml.jackson.module.scala.DefaultScalaModule"
  serialization-features {
    WRITE_DATES_AS_TIMESTAMPS = off
  }
  deserialization-features {
    FAIL_ON_UNKNOWN_PROPERTIES = off
  }
}
