{{- if and .Values.apiGateway.enabled .Values.apiGateway.hpa.enabled }}
{{- $serviceName := "api-gateway" }}
{{- $svcValues := .Values.apiGateway }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ $serviceName }}
  namespace: {{ include "ecommerce-platform.namespace" . }}
  labels:
    {{- include "ecommerce-platform.serviceLabels" (dict "serviceName" $serviceName "serviceValues" $svcValues "Release" .Release "Chart" .Chart) | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $serviceName }}
  minReplicas: {{ $svcValues.hpa.minReplicas }}
  maxReplicas: {{ $svcValues.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $svcValues.hpa.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ $svcValues.hpa.targetMemoryUtilizationPercentage }}
{{- end }}
